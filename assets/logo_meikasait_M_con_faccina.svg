<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="194" height="180" viewBox="160 25 194 180" role="img" aria-label="MEIKASA.IT M con faccina" shape-rendering="geometricPrecision">
  <title>MEIKASA.IT — M con faccina vettoriale</title>
